version: "3"

tasks:
  default:
    desc: Build and start containers
    interactive: true
    cmd: infisical run --watch -- docker compose up --build --remove-orphans {{.CLI_ARGS}}

  setup:
    desc: Run initial setup
    cmds:
      - pip install -U prek
      - prek install

  psql:
    desc: Access Postgres CLI
    cmd: docker compose exec -- db psql -U postgres

  exec:
    desc: Execute command in specified container
    cmds:
      - docker compose exec -- {{.CLI_ARGS}}

  restart:
    desc: Restart all containers
    cmds:
      - docker compose restart {{.CLI_ARGS}}

  logs:
    desc: Show Docker logs
    cmds:
      - docker compose logs --follow {{.CLI_ARGS}}

  stop:
    desc: Stop all containers
    cmds:
      - docker compose stop {{.CLI_ARGS}}

  clean:
    desc: Stop and remove all containers
    cmds:
      - docker compose down --volumes --remove-orphans {{.CLI_ARGS}}
